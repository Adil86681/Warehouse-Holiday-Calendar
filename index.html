<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Holiday Calendar 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeecea;
    --text: #1a1a18;
    --text-secondary: #6b6a66;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --blue-light: #E6F1FB;
    --blue-mid: #B5D4F4;
    --blue: #185FA5;
    --blue-dark: #0C447C;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #262624;
      --bg-tertiary: #2e2e2b;
      --text: #f0ede8;
      --text-secondary: #9e9c96;
      --border: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.22);
      --blue-light: #0c2e52;
      --blue-mid: #0c447c;
      --blue: #378ADD;
      --blue-dark: #85B7EB;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; }
  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .hdr { margin-bottom: 1.75rem; }
  .hdr h1 { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .hdr p { font-size: 14px; color: var(--text-secondary); }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 1.25rem; }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
  select { height: 36px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 13px; padding: 0 10px; cursor: pointer; min-width: 170px; outline: none; }
  select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(24,95,165,0.15); }
  .tog-wrap { display: flex; height: 36px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); overflow: hidden; background: var(--bg); }
  .tog-btn { border: none; background: none; color: var(--text-secondary); font-size: 13px; padding: 0 16px; cursor: pointer; transition: background 0.12s, color 0.12s; white-space: nowrap; font-family: inherit; }
  .tog-btn:first-child { border-right: 0.5px solid var(--border); }
  .tog-btn.active { background: var(--bg-secondary); color: var(--text); font-weight: 500; }
  .tog-btn:hover:not(.active) { background: var(--bg-secondary); }
  .region-section { margin-bottom: 1.25rem; }
  .region-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .region-pill { font-size: 12px; padding: 4px 11px; border-radius: 999px; border: 0.5px solid var(--border-strong); cursor: pointer; user-select: none; transition: background 0.12s, color 0.12s, border-color 0.12s; background: var(--bg); color: var(--text-secondary); }
  .region-pill.on { background: var(--blue); color: #E6F1FB; border-color: var(--blue); }
  .region-pill:hover:not(.on) { background: var(--bg-secondary); color: var(--text); }
  .all-none { font-size: 12px; padding: 4px 11px; border-radius: 999px; border: 0.5px dashed var(--border-strong); cursor: pointer; color: var(--text-secondary); background: none; font-family: inherit; }
  .all-none:hover { background: var(--bg-secondary); }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 500; color: var(--text); }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 0.5px solid var(--border); }
  .swatch-all { background: var(--blue); border-color: var(--blue-dark); }
  .swatch-some { background: var(--blue-light); border-color: var(--blue-mid); }
  .swatch-wknd { background: #FFD8A8; border-color: #FFB870; }
  .tooltip { position: fixed; background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,0.12); pointer-events: none; z-index: 9999; max-width: 220px; display: none; }
  .tooltip-date { font-weight: 500; margin-bottom: 5px; color: var(--text); }
  .tooltip-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .tooltip-tag { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: var(--blue-light); color: var(--blue-dark); }
  .months-grid { display: flex; flex-direction: column; gap: 1.75rem; }
  .month-block { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .month-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dh { font-size: 10px; color: var(--text-secondary); text-align: center; padding: 5px 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }
  .cal-day { border-radius: 6px; min-height: 56px; padding: 5px 6px; border: 0.5px solid var(--border); }
  .cal-day.empty { border-color: transparent; background: none; }
  .cal-day.weekend { background: #FFF0E0; border-color: #FFD8A8; }
  @media (prefers-color-scheme: dark) { .cal-day.weekend { background: #3a2810; border-color: #6b4520; } }
  .cal-day.has-off { background: var(--blue-light); border-color: var(--blue-mid); }
  .cal-day.all-off { background: var(--blue); border-color: var(--blue-dark); }
  .day-num { font-size: 11px; color: var(--text-secondary); }
  .cal-day.has-off .day-num { color: var(--blue-dark); font-weight: 500; }
  .cal-day.all-off .day-num { color: #E6F1FB; font-weight: 500; }
  .off-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
  .off-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }
  .cal-day.all-off .off-dot { background: rgba(230,241,251,0.7); }
  .off-count { font-size: 10px; color: var(--blue); font-weight: 500; margin-top: 3px; }
  .cal-day.all-off .off-count { color: #B5D4F4; }
  .list-view { display: flex; flex-direction: column; gap: 1.5rem; }
  .list-month { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .list-month-hdr { font-size: 14px; font-weight: 500; color: var(--text); padding: 14px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); }
  .list-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); }
  .list-row:last-child { border-bottom: none; }
  .list-date-col { min-width: 90px; }
  .list-date { font-size: 13px; font-weight: 500; color: var(--text); }
  .list-dow { font-size: 11px; color: var(--text-secondary); }
  .list-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .list-tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--blue-light); color: var(--blue-dark); font-weight: 500; }
  .empty-msg { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); }
</style>
</head>
<body>
<div id="tooltip" class="tooltip"><div class="tooltip-date" id="tt-date"></div><div class="tooltip-tags" id="tt-tags"></div></div>

<div class="page">
  <div class="hdr">
    <h1>Warehouse holiday calendar 2026</h1>
    <p>Public holidays by region — filter by month and location</p>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Month</span>
      <select id="month-sel">
        <option value="all">All months</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">View</span>
      <div class="tog-wrap">
        <button class="tog-btn" id="btn-cal" onclick="setView('cal')">Calendar</button>
        <button class="tog-btn active" id="btn-list" onclick="setView('list')">List</button>
      </div>
    </div>
  </div>

  <div class="region-section">
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <span class="ctrl-label">Regions</span>
      <button class="all-none" onclick="toggleAll(true)">All</button>
      <button class="all-none" onclick="toggleAll(false)">None</button>
    </div>
    <div class="region-pills" id="region-pills"></div>
  </div>

  <div class="stats" id="stats-bar"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-all"></div> All selected regions off</div>
    <div class="legend-item"><div class="legend-swatch swatch-some"></div> Some regions off</div>
    <div class="legend-item"><div class="legend-swatch swatch-wknd"></div> Weekend</div>
  </div>

  <div id="view-cal" style="display:none;"></div>
  <div id="view-list"></div>
</div>

const REGIONS = ['US','UK','EU','AUSTRALIA','NEW ZEALAND','CAN-OSHAWA','CAN-MONTREAL','INDIA','ISRAEL','SINGAPORE','PHILIPPINES','JAPAN','MALAYSIA','BRAZIL','ARGENTINA','MEXICO','GUATEMALA','COLOMBIA','CHILE','COSTA RICA','UAE','KOREA'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let activeRegions = new Set(REGIONS);
let activeMonth = 'all';
let viewMode = 'list';

function parseCSV() {
  const rows = RAW_CSV.trim().split('\n');
  const headers = rows[0].split(',');
  const data = [];
  let curMonth = '';
  for (let i = 1; i < rows.length; i++) {
    const cols = rows[i].split(',');
    if (cols[0]) curMonth = cols[0];
    const date = cols[1];
    const dayNum = parseInt(cols[2]);
    const offRegions = [];
    for (let j = 3; j < headers.length; j++) {
      if (cols[j] === 'OFF') offRegions.push(headers[j]);
    }
    if (offRegions.length > 0) {
      data.push({ month: curMonth, date, day: dayNum, offRegions });
    }
  }
  return data;
}

const allData = parseCSV();

function filteredData() {
  return allData.filter(d => {
    const monthOk = activeMonth === 'all' || d.month === activeMonth;
    const regMatch = d.offRegions.some(r => activeRegions.has(r));
    return monthOk && regMatch;
  });
}

function buildMonthSel() {
  const s = document.getElementById('month-sel');
  MONTHS.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m; s.appendChild(o);
  });
  s.onchange = () => { activeMonth = s.value; render(); };
}

function buildPills() {
  const c = document.getElementById('region-pills');
  c.innerHTML = '';
  REGIONS.forEach(r => {
    const p = document.createElement('span');
    p.className = 'region-pill' + (activeRegions.has(r) ? ' on' : '');
    p.textContent = r;
    p.onclick = () => {
      if (activeRegions.has(r)) activeRegions.delete(r);
      else activeRegions.add(r);
      render();
    };
    c.appendChild(p);
  });
}

function toggleAll(on) {
  if (on) REGIONS.forEach(r => activeRegions.add(r));
  else activeRegions.clear();
  render();
}

function updateStats(fd) {
  const totalDays = fd.length;
  const regSet = new Set();
  fd.forEach(d => d.offRegions.forEach(r => { if (activeRegions.has(r)) regSet.add(r); }));
  const months = new Set(fd.map(d => d.month)).size;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-label">Holiday days</div><div class="stat-val">${totalDays}</div></div>
    <div class="stat"><div class="stat-label">Regions affected</div><div class="stat-val">${regSet.size}</div></div>
    <div class="stat"><div class="stat-label">Months shown</div><div class="stat-val">${months}</div></div>
  `;
}

function renderCal(fd) {
  const byMonth = {};
  MONTHS.forEach(m => byMonth[m] = {});
  fd.forEach(d => {
    const activeOff = d.offRegions.filter(r => activeRegions.has(r));
    if (activeOff.length > 0) {
      if (!byMonth[d.month]) byMonth[d.month] = {};
      byMonth[d.month][d.day] = activeOff;
    }
  });

  const months = activeMonth === 'all' ? MONTHS : [activeMonth];
  let html = '<div class="months-grid">';
  let anyRendered = false;

  months.forEach(m => {
    const entries = byMonth[m] || {};
    if (Object.keys(entries).length === 0) return;
    anyRendered = true;
    const year = 2026;
    const mIdx = MONTHS.indexOf(m);
    const firstDow = new Date(year, mIdx, 1).getDay();
    const daysInMonth = new Date(year, mIdx + 1, 0).getDate();

    html += `<div class="month-block"><div class="month-name">${m} 2026</div><div class="cal-grid">`;
    DAYS_SHORT.forEach(d => { html += `<div class="cal-dh">${d}</div>`; });
    for (let i = 0; i < firstDow; i++) html += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = (firstDow + d - 1) % 7;
      const isWeekend = dow === 0 || dow === 6;
      const offs = entries[d];
      let cls = '';
      if (offs) cls = (offs.length >= activeRegions.size && activeRegions.size > 0) ? 'all-off' : 'has-off';
      else if (isWeekend) cls = 'weekend';
      html += `<div class="cal-day ${cls}" ${offs ? `data-offs="${offs.join('|')}" data-date="${DAYS_SHORT[(firstDow + d - 1) % 7]}, ${m} ${d}"` : ''}>`;
      html += `<div class="day-num">${d}</div>`;
      if (offs) {
        const shown = offs.slice(0, 10);
        html += `<div class="off-dots">${shown.map(() => '<div class="off-dot"></div>').join('')}</div>`;
        html += `<div class="off-count">${offs.length} region${offs.length !== 1 ? 's' : ''}</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  });

  html += '</div>';
  if (!anyRendered) html = `<div class="empty-msg">No holidays match your current filters.</div>`;
  document.getElementById('view-cal').innerHTML = html;
}

function renderList(fd) {
  if (fd.length === 0) {
    document.getElementById('view-list').innerHTML = `<div class="empty-msg">No holidays match your current filters.</div>`;
    return;
  }
  const byMonth = {};
  fd.forEach(d => {
    const activeOff = d.offRegions.filter(r => activeRegions.has(r));
    if (activeOff.length > 0) {
      if (!byMonth[d.month]) byMonth[d.month] = [];
      byMonth[d.month].push({ ...d, activeOff });
    }
  });
  const months = activeMonth === 'all' ? MONTHS : [activeMonth];
  let html = '<div class="list-view">';
  let anyRendered = false;
  months.forEach(m => {
    const entries = byMonth[m];
    if (!entries || entries.length === 0) return;
    anyRendered = true;
    html += `<div class="list-month"><div class="list-month-hdr">${m} 2026</div>`;
    entries.forEach(e => {
      const dateObj = new Date(e.date);
      const dow = DAYS_SHORT[dateObj.getDay()];
      const mShort = MONTHS_SHORT[MONTHS.indexOf(e.month)];
      html += `<div class="list-row">
        <div class="list-date-col">
          <div class="list-date">${mShort} ${e.day}</div>
          <div class="list-dow">${dow}</div>
        </div>
        <div class="list-tags">${e.activeOff.map(r => `<span class="list-tag">${r}</span>`).join('')}</div>
      </div>`;
    });
    html += `</div>`;
  });
  html += '</div>';
  if (!anyRendered) html = `<div class="empty-msg">No holidays match your current filters.</div>`;
  document.getElementById('view-list').innerHTML = html;
}

function setView(v) {
  viewMode = v;
  document.getElementById('view-cal').style.display = v === 'cal' ? 'block' : 'none';
  document.getElementById('view-list').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('btn-cal').className = 'tog-btn' + (v === 'cal' ? ' active' : '');
  document.getElementById('btn-list').className = 'tog-btn' + (v === 'list' ? ' active' : '');
  if (v === 'cal') renderCal(filteredData());
  else renderList(filteredData());
}

function render() {
  buildPills();
  const fd = filteredData();
  updateStats(fd);
  if (viewMode === 'cal') renderCal(fd);
  else renderList(fd);
}

buildMonthSel();
render();

const tooltip = document.getElementById('tooltip');
const ttDate = document.getElementById('tt-date');
const ttTags = document.getElementById('tt-tags');

document.addEventListener('mouseover', e => {
  const cell = e.target.closest('.cal-day[data-offs]');
  if (!cell) { tooltip.style.display = 'none'; return; }
  const offs = cell.dataset.offs.split('|');
  ttDate.textContent = cell.dataset.date;
  ttTags.innerHTML = offs.map(r => `<span class="tooltip-tag">${r}</span>`).join('');
  tooltip.style.display = 'block';
});

document.addEventListener('mousemove', e => {
  if (tooltip.style.display === 'none') return;
  const x = e.clientX + 14;
  const y = e.clientY + 14;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth - 8 ? e.clientX - tw - 10 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight - 8 ? e.clientY - th - 10 : y) + 'px';
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.cal-day[data-offs]')) return;
  if (!e.relatedTarget || !e.relatedTarget.closest('.cal-day[data-offs]')) {
    tooltip.style.display = 'none';
  }
});
</script>
